<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Background circle -->
  <circle cx="40" cy="40" r="38" fill="#dbeafe"/>

  <!-- Card 1 -->
  <rect x="14" y="22" width="22" height="15" rx="3" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="25" y="33" font-family="sans-serif" font-size="8" font-weight="bold" fill="#3b82f6" text-anchor="middle">GATO</text>

  <!-- Card 2 -->
  <rect x="44" y="22" width="22" height="15" rx="3" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="55" y="33" font-family="sans-serif" font-size="8" font-weight="bold" fill="#3b82f6" text-anchor="middle">MIAU</text>

  <!-- Connecting arc -->
  <path d="M 36 29 Q 40 20 44 29" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="2,2"/>
  <circle cx="40" cy="20" r="1.5" fill="#3b82f6"/>

  <!-- Card 3 -->
  <rect x="14" y="45" width="22" height="15" rx="3" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="25" y="56" font-family="sans-serif" font-size="8" font-weight="bold" fill="#3b82f6" text-anchor="middle">SOL</text>

  <!-- Card 4 -->
  <rect x="44" y="45" width="22" height="15" rx="3" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="55" y="56" font-family="sans-serif" font-size="8" font-weight="bold" fill="#3b82f6" text-anchor="middle">CALOR</text>

  <!-- Connecting arc -->
  <path d="M 36 52 Q 40 62 44 52" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="2,2"/>
  <circle cx="40" cy="62" r="1.5" fill="#3b82f6"/>
</svg>
