<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Background circle -->
  <circle cx="40" cy="40" r="38" fill="#d8eee1"/>

  <!-- Clock face -->
  <circle cx="40" cy="34" r="18" fill="white" stroke="#4a7c59" stroke-width="2"/>
  <!-- Clock ticks -->
  <line x1="40" y1="18" x2="40" y2="22" stroke="#4a7c59" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="46" x2="40" y2="50" stroke="#4a7c59" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="34" x2="28" y2="34" stroke="#4a7c59" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="34" x2="56" y2="34" stroke="#4a7c59" stroke-width="2" stroke-linecap="round"/>
  <!-- Clock hands -->
  <line x1="40" y1="34" x2="40" y2="24" stroke="#2d5a3d" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="34" x2="48" y2="34" stroke="#2d5a3d" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="40" cy="34" r="2" fill="#2d5a3d"/>

  <!-- Foot outline -->
  <ellipse cx="36" cy="60" rx="7" ry="4" fill="#4a7c59" opacity="0.7" transform="rotate(-10 36 60)"/>
  <!-- Toes -->
  <circle cx="31" cy="57" r="1.8" fill="#4a7c59" opacity="0.7"/>
  <circle cx="33.5" cy="55.5" r="1.8" fill="#4a7c59" opacity="0.7"/>
  <circle cx="36" cy="55" r="1.8" fill="#4a7c59" opacity="0.7"/>
  <circle cx="38.5" cy="55.5" r="1.8" fill="#4a7c59" opacity="0.7"/>
  <circle cx="41" cy="56.5" r="1.5" fill="#4a7c59" opacity="0.7"/>
</svg>
