<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 405 720" width="405" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3626"/>
      <stop offset="100%" stop-color="#2d5a3d"/>
    </linearGradient>
    <filter id="glow-btn">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#f59e0b" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="405" height="720" fill="url(#bg)"/>

  <!-- Play button -->
  <circle cx="202" cy="340" r="52" fill="#f59e0b" filter="url(#glow-btn)"/>
  <polygon points="191,321 191,359 227,340" fill="white"/>

  <!-- Label -->
  <text x="202" y="420" font-family="sans-serif" font-size="15" fill="#d8eee1" text-anchor="middle" letter-spacing="0.5">Assista agora</text>
</svg>
